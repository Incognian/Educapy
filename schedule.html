<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>EduCapy</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="educapy-header">
    <h1>
      EduCapy
    </h1>
      <div class="educapy-header-right">
        
        <a viewableby=2 href="timeslot.html">
          Slot Waktu
        </a>
        <a viewableby=2 href="willingness.html">
          Kesediaan
        </a>
        <a href="course_new.html">
          Daftar Kursus
        </a>
        <a viewableby=3 href="schedule_manage.html">
          Kelola Jadwal
        </a>
        <a href="schedule.html">
          Jadwal Aktif
        </a>
        <a href="account.html">
          Akun
        </a>
        <a viewableby=3 href="account_create.html">
          Buat Akun
        </a>
      </div>
  </div>

  <div viewableby=3 class="table-selector">
    <label><strong>Select Guru:</strong></label>
    <select id="user-selector-dropdown" onchange="showSchedule()"></select>
  </div>

  <div class="page">
    <div class="time-table">
      <div class="column-names">
        <h1>Senin</h1>
        <h1>Selasa</h1>
        <h1>Rabu</h1>
        <h1>Kamis</h1>
        <h1>Jumat</h1>
        <h1>Sabtu</h1>
        <h1>Minggu</h1>
      </div>

      <div class="row-names">
        <h1>08:00-09:00</h1>
        <h1>09:00-10:00</h1>
        <h1>10:00-11:00</h1>
        <h1>11:00-12:00</h1>
        <h1>12:00-13:00</h1>
        <h1>13:00-14:00</h1>
        <h1>14:00-15:00</h1>
        <h1>15:00-16:00</h1>
        <h1>16:00-17:00</h1>
        <h1>17:00-18:00</h1>
        <h1>18:00-19:00</h1>
        <h1>19:00-20:00</h1>
      </div>

      <div class="actual-schedule" id="actual-schedule"></div>

    </div>
  </div>

  <script src="script.js"></script>
  <script>document.addEventListener("DOMContentLoaded", showSchedule);</script>
  <script>document.addEventListener("DOMContentLoaded", populateGuruDropdown);</script>
</body>
</html>

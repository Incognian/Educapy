<body>
  <div class="educapy-header">
    <h1>
      EduCapy
    </h1>
      <div class="educapy-header-right">
        
        <a viewableby=2 href="timeslot.html">

  <div class="login-page">
    <div class>
      <h2 class="title">
        Daftarkan Akun
      </h2>

      <p class="subtitle">
        Daftarkan Akun Baru Sebagai Admin
      </p>

        <!-- REGISTER -->

        <div class="card">

          <label class="cool-label">
            Nama Lengkap
          </label>

          <input class="cool-input" id="reg-name" type="text" />

          <label class="cool-label">
            E-mail
          </label>

          <input class="cool-input" id="reg-email" type="email" />

          <label class="cool-label">
            Password
          </label>

          <input class="cool-input" id="reg-pass" type="password" />

          <label class="cool-label">
            Tipe
          </label>

          <select class="cool-select" id="reg-tipe">
            <option value="1">Siswa</option>
            <option value="2">Guru</option>
            <option value="3">Admin</option>
          </select>
          <br>
          <br>

          <button class="cool-button" onclick="registerAdmin()">
            Daftar
          </button>

        </div>

    </div>
  </div>

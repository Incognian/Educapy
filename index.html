<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>EduCapy</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="educapy-header">
    <h1>
      EduCapy
    </h1>
  </div>
  
  <div class="page">
    <div class>
      <h2 class="title">
        Masuk
      </h2>

      <p class="subtitle">
        Daftar sebagai siswa atau masuk dengan akun yang sudah ada
      </p>


      <div class="card-container">

        <!-- REGISTER -->

        <div class="card">

          <h3>
            Registrasi
          </h3>

          <p class="card-subtitle">
            Daftar sebagai siswa
          </p>

          <label>
            Nama Lengkap
          </label>

          <input id="reg-name" type="text" />

          <label>
            E-mail
          </label>

          <input id="reg-email" type="email" />

          <label>
            Password
          </label>

          <input id="reg-pass" type="password" />

          <button onclick="register()">
            Daftar
          </button>

        </div>


        <!-- LOGIN -->

        <div class="card">

          <h3>
            Login
          </h3>

          <p class="card-subtitle">
            Masuk ke akunmu
          </p>

          <label>
            E-mail
          </label>

          <input id="log-email" type="email" />

          <label>
            Password
          </label>

          <input id="log-pass" type="password" />

          <button>
            Masuk
          </button>

        </div>

      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>

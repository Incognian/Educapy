<!DOCTYPE html>
<!-- EduCapy timeslot management page -->
<html lang="en">
<head>
  <!-- Page metadata and responsive viewport scaling -->
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>EduCapy</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Main header row containing the site title and the top navigation links -->
  <div class="educapy-header">
    <h1>
      EduCapy
    </h1>
      <div class="educapy-header-right">
        
        <a viewableby=2 href="timeslot.html">
          Slot Waktu
        </a>
        <a viewableby=2 href="willingness.html">
          Kesediaan
        </a>
        <a href="course_new.html">
          Daftar Kursus
        </a>
        <a viewableby=3 href="schedule_manage.html">
          Kelola Jadwal
        </a>
        <a href="schedule.html">
          Jadwal Aktif
        </a>
        <a href="account.html">
          Akun
        </a>
        <a viewableby=3 href="account_create.html">
          Buat Akun
        </a>
      </div>
  </div>

  <!-- Page wrapper uses the shared page layout rules from style.css -->
  <div class="page">
    <!-- layout-container keeps the timeslot table and selector panels side by side -->
    <div class="selector-table-container">
      
      <!-- Timeslot table for time slot rows and action controls -->
      <table class="schedule-table">
        <thead>
          <tr>
            <th>hari</th>
            <th>jamAwal</th>
            <th>jamAkhir</th>
            <th></th>
          </tr>
        </thead>
        
        <tbody id="schedule-table">
          <!-- Placeholder row; actual timeslot rows are generated by loadSlots() -->
          <tr>
            <td></td>
            <td></td>
            <td></td>
            <td>
              <span class="action-icon">✕</span>
            </td>
          </tr>
        </tbody>

        <tfoot>
          <tr>
            <td>
              <!-- Dropdown to choose the weekday for the time slot -->
              <select id="dayVal" name="hari">
                <option value="Senin">Senin</option>
                <option value="Selasa">Selasa</option>
                <option value="Rabu">Rabu</option>
                <option value="Kamis">Kamis</option>
                <option value="Jumat">Jumat</option>
                <option value="Sabtu">Sabtu</option>
                <option value="Minggu">Minggu</option>
              </select>
            </td>
            <td>
              <!-- Input for the starting hour of the time slot -->
              <input id="startTime" type="number" min="8" max="19" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="Jam Awal" />
            </td>
            <td>
              <!-- Input for the ending hour of the time slot -->
              <input id="endTime" type="number" min="9" max="20" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="Jam Akhir" />
            </td>
            <td>
              <span class="action-icon" onclick="addSlot()">✛</span>
            </td>
          </tr>
        </tfoot>
      </table>

      <!-- Guru selector panel with label and dropdown -->
      <div class="table-selector" viewableby=3>
        <label><strong>Select Guru:</strong></label>
        <select id="user-selector-dropdown" onchange="loadSlots()"></select>
      </div>

    </div>
  </div>

  <!-- Load shared page logic from script.js -->
  <script src="script.js"></script>
  <script>document.addEventListener("DOMContentLoaded", kick([false, true, true]));</script>
  <!-- Initialize the timeslot and guru dropdown once DOM content is ready -->
  <script>document.addEventListener("DOMContentLoaded", populateGuruDropdown);</script>
  <script>document.addEventListener("DOMContentLoaded", loadSlots);</script>
</body>
</html>

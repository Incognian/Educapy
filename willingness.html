<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>EduCapy</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="educapy-header">
    <h1>
      EduCapy
    </h1>
      <div class="educapy-header-right">
        <a viewableby=2 href="willingness.html">
          Kesediaan
        </a>
        <a href="newcourse.html">
          Daftar Kursus
        </a>
        <a href="schedule.html">
          Jadwal Aktif
        </a>
        <a href="account.html">
          Akun
        </a>
      </div>
  </div>
  
  <div class="page">
    <div class="selector-table-container">
      <!-- Schedule table for course rows and action controls -->
      <table class="schedule-table">
        <thead>
          <tr>
            <th>Mata Pelajaran</th>
            <th>Jenjang</th>
            <th></th>
          </tr>
        </thead>
        
        <tbody id="willingness-table">
          <!-- Placeholder row; actual schedule rows are generated by showSchedule() -->
          <tr>
            <td></td>
            <td></td>
            <td>
              <span class="action-icon">✕</span>
            </td>
          </tr>
        </tbody>

        <tfoot>
          <tr>
            <td>
              <!-- Dropdown to choose the subject for the willingness entry -->
              <select id="idMapel"></select>
            </td>
            <td>
              <!-- Dropdown to choose the level for the willingness entry -->
              <select id="idJenjang"></select>
            </td>
            <td>
              <span class="action-icon" onclick="addWillingness()">✛</span>
            </td>
          </tr>
        </tfoot>
      </table>

      <!-- Guru selector panel with label and dropdown -->
      <div viewableby=3 class="table-selector">
        <label><strong>Select Guru:</strong></label>
        <select id="user-selector-dropdown" onchange="loadWillingness()"></select>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
  <script>document.addEventListener("DOMContentLoaded", loadWillingness);</script>
  <script>document.addEventListener("DOMContentLoaded", populateDropdown(0, "idMapel"));</script>
  <script>document.addEventListener("DOMContentLoaded", populateDropdown(1, "idJenjang"));</script>
</body>

<body>
  <div class="educapy-header">

    <div class="login-page">
        <!-- left side -->
        <div>

            <h2 class="title">
                Edit Informasi Akun
            </h2>

            <p class="subtitle">
                
            </p>
            
            <div class="card">
                
                <!-- EDIT AKUN -->

                <div class="body">
                
                <h3 class="cool-h3">
                    Edit Informasi Akun
                </h3>
                

                <!-- <p class="card-subtitle">
                    Daftar sebagai siswa
                </p> -->
                
                <label class="cool-label">
                    Email Kontak 1
                </label>

                <input class="cool-input" id="email-kontak-1">

                <!-- <output id = "all-email">
                    unchanged
                </output> -->

                <label class="cool-label">
                    Nomor Telepon Kontak 1
                </label>

                <input class="cool-input" id="nomor-kontak-1">

                <label class="cool-label">
                    Email Kontak 2
                </label>

                <input class="cool-input" id="email-kontak-2" />

                <!-- <output id = "all-email">
                    unchanged
                </output> -->

                <label class="cool-label">
                    Nomor Telepon Kontak 2
                </label>

                <input class="cool-input" id="nomor-kontak-2"/>

                <div class="selector" viewableby=1>
                    <label class = "cool-label">Tingkat Pendidikan</label>
                    <select class = "cool-select" id="idJenjang">
                    </select>
                </div>

                <div viewableby=2>
                    <label class = "cool-label">
                    Pengalaman Kerja 1
                    </label>

                    <input class = "cool-input" id="pengalaman-1">
                    <label class = "cool-label">
                    Pengalaman Kerja 2
                    </label>
                    <input class = "cool-input" id="pengalaman-2">
                </div>

                <br>
                <br>

                <button class="cool-button" onclick="changeAccountInformation()">
                    Simpan Perubahan
                </button>
                
                </div>

            </div>

            <button class="cool-button" onclick="logout()">
                    Logout
            </button>

        </div>

        <!-- right side -->

        <div>

            <h2 class="title">
                Cari Informasi Akun
            </h2>

            <p class="subtitle">
                
            </p>
            
            <div class="card">
                
                <div class="selector">
                    <label class = "cool-label">ID Pengguna: </label>
                    <input class="cool-select" id="search-ID"></input>
                </div>
                <br>

                <button class="cool-button" onclick="searchAccount()">
                    Cari
                </button>
                <br>
                <br>

                <!-- INFORMASI AKUN -->

                <div class="body">
                
                <label class="cool-label">
                    Email Kontak 1
                </label>
                <label class="cool-label" id="email-kontak-1-res">-</label>
                <br>

                <label class="cool-label">
                    Nomor Telepon Kontak 1
                </label>
                <label class="cool-label" id="nomor-kontak-1-res">-</label>
                <br>

                <label class="cool-label">
                    Email Kontak 2
                </label>
                <label class="cool-label" id="email-kontak-2-res">-</label>
                <br>

                <label class="cool-label">
                    Nomor Telepon Kontak 2
                </label>
                <label class="cool-label" id="nomor-kontak-2-res">-</label>
                <br>

                <label class = "cool-label">Tingkat Pendidikan: </label>
                <label class = "cool-label" id="idJenjang-res">-</label>
                <br>

                <div>
                    <label class = "cool-label">
                    Pengalaman Kerja 1
                    </label>
                    <label class = "cool-label" id="pengalaman-1-res">-</label>
                    <br>

                    <label class = "cool-label">
                    Pengalaman Kerja 2
                    </label>
                    <label class = "cool-label" id="pengalaman-2-res">-</label>
                </div>
                
                </div>

            </div>

        </div>

    </div>

  <script src="script.js"></script>
  <script>document.addEventListener("DOMContentLoaded", loadAccountInformation);</script>
  <script>document.addEventListener("DOMContentLoaded", populateDropdown(1, "idJenjang"));</script>
